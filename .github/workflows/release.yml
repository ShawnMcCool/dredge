name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    # 24.04, not 22.04: the libspa-sys 0.10 bindings need PipeWire 1.0+ headers
    # (22.04's libspa is too old — missing spa_meta_region_is_valid etc.).
    runs-on: ubuntu-24.04
    # mold cuts the link step (the desktop binary pulls in webkit/gtk); only the
    # linker is affected, so it's a safe speedup for the release build too.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      # Caches the apt .debs so the webkit/gtk/pipewire dev libs aren't
      # re-downloaded every run. Bump `version` to invalidate the cache.
      - name: System dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libxdo-dev
            libayatana-appindicator3-dev libssl-dev librubberband-dev
            libpipewire-0.3-dev libspa-0.2-dev libasound2-dev clang pkg-config
            build-essential
          version: "2"

      - uses: dtolnay/rust-toolchain@stable

      - name: Faster linking (mold)
        uses: rui314/setup-mold@v1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: cd apps/desktop && pnpm install --frozen-lockfile

      - name: Build release artifacts (.deb + tarball + SHA256SUMS)
        run: just artifacts

      # The real Debian regression catch: install the .deb on a clean Ubuntu,
      # which forces apt to resolve every declared runtime dependency.
      - name: Smoke-test the .deb
        run: |
          sudo apt-get install -y ./dist/dredge_*_amd64.deb
          command -v dredge
          test -x /usr/bin/dredged
          test -x /usr/bin/dredge-analyze
          test -x /usr/bin/dredge-enable-ml
          test -f /usr/lib/dredge/analyze_impl.py
          test -f /usr/lib/dredge/songformer_impl.py
          echo "deb installs cleanly and lays out the expected files"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true

  # After the release publishes, push the bumped PKGBUILD to the AUR. Runs in
  # an Arch container (makepkg refuses to run as root, hence the 'builder' user)
  # and reuses scripts/ship's aur logic in --ci mode — it bumps pkgver,
  # regenerates .SRCINFO, and pushes the source `dredge` package to its AUR
  # remote (the package builds from the git tag, so no release checksum is
  # needed; `needs: release` still gates on a green build). Requires the
  # AUR_SSH_PRIVATE_KEY secret: a deploy key whose public half is registered on
  # the maintainer's AUR account (additional to the personal key). The in-repo
  # PKGBUILD is left as a template here; run `scripts/ship aur` locally to also
  # commit a bump back to the repo. New per-release publishing (rpm, Flatpak,
  # announcements) belongs here as further `needs: release` jobs.
  aur:
    needs: release
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    steps:
      - name: Install tooling
        run: pacman -Syu --noconfirm --needed git openssh

      - uses: actions/checkout@v4

      - name: Configure AUR SSH and a build user
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          install -d -m700 /home/builder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/aur
          chmod 600 /home/builder/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > /home/builder/.ssh/known_hosts 2>/dev/null
          cat > /home/builder/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile /home/builder/.ssh/aur
            IdentitiesOnly yes
          EOF
          chown -R builder:builder /home/builder/.ssh

      - name: Publish to the AUR
        run: |
          ver="${GITHUB_REF_NAME#v}"
          su - builder -c "
            git config --global user.name 'Shawn McCool'
            git config --global user.email 'shawn@mccool.email'
            git config --global --add safe.directory '$GITHUB_WORKSPACE'
            cd '$GITHUB_WORKSPACE'
            scripts/ship aur '$ver' --ci
          "
